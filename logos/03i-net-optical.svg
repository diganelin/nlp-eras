<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#fff8ef"/>
  <!-- Variant I: same as H but with per-letter OPTICAL balance.
       L's mass sits at the bottom-left, so a geometrically centered L looks
       "low"; raise it slightly. P's bowl is on top, so a geometric P looks
       "high"; lower it slightly. -->
  <g stroke="#b8530a" stroke-width="3" fill="none">
    <line x1="78"  y1="64"  x2="190" y2="128"/>
    <line x1="78"  y1="128" x2="190" y2="128"/>
    <line x1="78"  y1="192" x2="190" y2="128"/>
  </g>
  <g fill="#b8530a">
    <circle cx="64" cy="64"  r="34"/>
    <circle cx="64" cy="128" r="34"/>
    <circle cx="64" cy="192" r="34"/>
    <circle cx="190" cy="128" r="22"/>
  </g>
  <g fill="#fff8ef" font-family="'Courier New', Courier, monospace" font-weight="900" font-size="64"
     text-anchor="middle">
    <text x="64" y="64"  dy=".35em">N</text>
    <text x="64" y="128" dy=".30em">L</text>
    <text x="64" y="192" dy=".40em">P</text>
  </g>
</svg>
