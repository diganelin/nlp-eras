<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#fff8ef"/>
  <!-- Variant J: tiny-size friendly. Bigger circles (r=40), bigger letters
       (font-size 76), slightly bolder lines, no extra ornament. Letters
       fill ~70% of each disk so they survive at favicon sizes. -->
  <g stroke="#b8530a" stroke-width="5" fill="none">
    <line x1="86"  y1="60"  x2="184" y2="128"/>
    <line x1="86"  y1="128" x2="184" y2="128"/>
    <line x1="86"  y1="196" x2="184" y2="128"/>
  </g>
  <g fill="#b8530a">
    <circle cx="60" cy="60"  r="40"/>
    <circle cx="60" cy="128" r="40"/>
    <circle cx="60" cy="196" r="40"/>
    <circle cx="196" cy="128" r="22"/>
  </g>
  <g fill="#fff8ef" font-family="'Courier New', Courier, monospace" font-weight="900" font-size="76"
     text-anchor="middle">
    <text x="60" y="60"  dy=".35em">N</text>
    <text x="60" y="128" dy=".30em">L</text>
    <text x="60" y="196" dy=".40em">P</text>
  </g>
</svg>
