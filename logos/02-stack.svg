<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#fff8ef"/>
  <!-- Three cascading tiles -->
  <g transform="translate(32 28)">
    <rect x="0"   y="0"   width="100" height="100" rx="18" fill="#b8530a"/>
    <rect x="46"  y="50"  width="100" height="100" rx="18" fill="#d96a17"/>
    <rect x="92"  y="100" width="100" height="100" rx="18" fill="#f08020"/>
    <text x="50"  y="60"
          text-anchor="middle" dominant-baseline="central"
          fill="#fff8ef" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-weight="800" font-size="68">N</text>
    <text x="96"  y="110"
          text-anchor="middle" dominant-baseline="central"
          fill="#fff8ef" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-weight="800" font-size="68">L</text>
    <text x="142" y="160"
          text-anchor="middle" dominant-baseline="central"
          fill="#fff8ef" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-weight="800" font-size="68">P</text>
  </g>
</svg>
