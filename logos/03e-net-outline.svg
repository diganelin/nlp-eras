<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#fff8ef"/>
  <!-- Variant E: same layout as D but circles are outlined, no fill;
       letters in accent color. -->
  <g stroke="#b8530a" stroke-width="3" fill="none">
    <line x1="78"  y1="64"  x2="190" y2="128"/>
    <line x1="78"  y1="128" x2="190" y2="128"/>
    <line x1="78"  y1="192" x2="190" y2="128"/>
  </g>
  <g fill="none" stroke="#b8530a" stroke-width="4">
    <circle cx="64" cy="64"  r="34"/>
    <circle cx="64" cy="128" r="34"/>
    <circle cx="64" cy="192" r="34"/>
    <circle cx="190" cy="128" r="22"/>
  </g>
  <g fill="#b8530a" font-family="'Courier New', Courier, monospace" font-weight="800" font-size="50"
     text-anchor="middle">
    <text x="64" y="64"  dy=".35em">N</text>
    <text x="64" y="128" dy=".35em">L</text>
    <text x="64" y="192" dy=".35em">P</text>
  </g>
</svg>
